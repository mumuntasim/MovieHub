<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie - MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #0f0f0f; }</style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center text-white mb-4">Edit Movie ✏️</h2>

                    <form th:action="@{/movies/edit/{id}(id=${movieId})}" th:method="POST" th:object="${movieAddDTO}">

                        <div class="mb-3">
                            <label class="form-label text-light">Movie Title</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" th:field="*{title}" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Description</label>
                            <textarea class="form-control bg-dark border-secondary text-white" th:field="*{description}" rows="3"></textarea>
                            <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Release Date</label>
                            <input type="date" class="form-control bg-dark border-secondary text-white" th:field="*{releaseDate}"/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">Genre</label>
                            <select class="form-select bg-dark border-secondary text-white" th:field="*{genreId}" required>
                                <option th:each="genre : ${allGenres}"
                                        th:value="${genre.id}"
                                        th:text="${genre.name}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-3">
                            <a href="/movies" class="btn btn-outline-secondary w-50 fw-bold">Cancel</a>
                            <button type="submit" class="btn btn-warning w-50 fw-bold">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
