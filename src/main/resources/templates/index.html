<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Welcome to MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero-section { backdrop-filter: blur(10px); background: rgba(0,0,0,0.3); padding: 3rem; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="hero-section shadow-lg border border-secondary">
        <h1 class="display-3 fw-bold text-white mb-4">🎬 Welcome to MovieHub</h1>
        <p class="lead text-secondary mb-5">Your personal platform to organize and discover great movies.</p>

        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">

            <div sec:authorize="isAnonymous()">
                <a href="/login" class="btn btn-outline-light btn-lg px-4 fw-bold">Login</a>
                <a href="/register" class="btn btn-outline-info btn-lg px-4 fw-bold">Register</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
