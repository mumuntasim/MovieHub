<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Join MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); min-height: 100vh; }
        .card { background-color: rgba(33, 37, 41, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="d-flex align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-primary rounded-4 mt-5 mb-5">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">🎬 MovieHub</h2>
                        <p class="text-muted">Create your account</p>
                    </div>

                    <form th:action="@{/register}" th:method="POST" th:object="${userRegisterDTO}">

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label text-light">First Name</label>
                                <input type="text" class="form-control bg-dark border-secondary" th:field="*{firstName}" placeholder="John" required />
                            </div>
                            <div class="col">
                                <label class="form-label text-light">Last Name</label>
                                <input type="text" class="form-control bg-dark border-secondary" th:field="*{lastName}" placeholder="Doe" required />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Username</label>
                            <input type="text" class="form-control bg-dark border-secondary" th:field="*{username}" placeholder="johndoe123" required minlength="3" />
                            <div class="text-warning small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Email Address</label>
                            <input type="email" class="form-control bg-dark border-secondary" th:field="*{email}" placeholder="john@example.com" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Password</label>
                            <input type="password" class="form-control bg-dark border-secondary" th:field="*{password}" placeholder="••••••••" required minlength="5" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">Confirm Password</label>
                            <input type="password" class="form-control bg-dark border-secondary" th:field="*{confirmPassword}" placeholder="••••••••" required minlength="5" />
                        </div>

                        <div th:if="${passwordError}" class="alert alert-danger text-center small border-danger">
                            <span th:text="${passwordError}"></span>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill py-2">Sign Up Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
