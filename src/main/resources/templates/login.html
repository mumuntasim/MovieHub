<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); min-height: 100vh; }
        .card { background-color: rgba(33, 37, 41, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-dark border-secondary shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center text-white mb-4">Welcome Back 🍿</h2>

                    <div th:if="${param.error}" class="alert alert-danger text-center small border-danger">
                        Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center small border-success">
                        You have been successfully logged out.
                    </div>

                    <form th:action="@{/login}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-light">Username</label>
                            <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required autofocus/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">Password</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required/>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Login</button>

                        <div class="text-center text-secondary small">
                            Don't have an account? <a href="/register" class="text-primary text-decoration-none">Register here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
