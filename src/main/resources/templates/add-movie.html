<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Add Movie - MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); min-height: 100vh; }
        .card { background-color: rgba(33, 37, 41, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center text-white mb-4">Add a New Movie 🎬</h2>

                    <form th:action="@{/movies/add}" th:method="POST" th:object="${movieAddDTO}">

                        <div class="mb-3">
                            <label class="form-label text-light">Movie Title</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" th:field="*{title}" placeholder="e.g. Inception" required/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Description / Synopsis</label>
                            <textarea class="form-control bg-dark border-secondary text-white" th:field="*{description}" rows="3" placeholder="What is the movie about?"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Release Date</label>
                            <input type="date" class="form-control bg-dark border-secondary text-white" th:field="*{releaseDate}"/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light">Genre</label>
                            <select class="form-select bg-dark border-secondary text-white" th:field="*{genreId}" required>
                                <option value="" disabled selected>Select a genre</option>
                                <option th:each="genre : ${allGenres}"
                                        th:value="${genre.id}"
                                        th:text="${genre.name}">Genre Name</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('genreId')}" th:errors="*{genreId}"></div>
                        </div>

                        <div class="d-flex gap-3">
                            <a href="/movies" class="btn btn-outline-secondary w-50 fw-bold">Cancel</a>
                            <button type="submit" class="btn btn-primary w-50 fw-bold">Save Movie</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
