<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Movies - MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); min-height: 100vh; }
        .card { background-color: rgba(33, 37, 41, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">🎬 MovieHub</a>

        <div class="d-flex align-items-center">
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                <form th:action="@{/logout}" method="POST" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-white">Trending Movies</h2>
        <div sec:authorize="isAuthenticated()">
            <a href="/movies/add" class="btn btn-success fw-bold px-4 rounded-pill">+ Add New Movie</a>
        </div>
    </div>

    <div class="card bg-dark border-secondary shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0 align-middle">
                <thead class="table-active text-uppercase small text-muted">
                <tr>
                    <th class="ps-4 py-3">Movie Title</th>
                    <th class="py-3">Synopsis</th>
                    <th class="py-3">Release Date</th>
                    <th class="py-3">Genre</th>
                    <th class="pe-4 py-3 text-end" sec:authorize="isAuthenticated()">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(movies)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <h4 class="mb-0">No movies found in the database yet.</h4>
                    </td>
                </tr>
                <tr th:each="movie : ${movies}">
                    <td class="ps-4 py-3 fw-bold text-white" th:text="${movie.title}">Title</td>
                    <td class="py-3 text-secondary" style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" th:text="${movie.description}">Description</td>
                    <td class="py-3" th:text="${movie.releaseDate}">Date</td>
                    <td class="py-3">
                        <span class="badge bg-secondary text-light" th:text="${movie.genre != null ? movie.genre.name : 'Unknown'}">Genre</span>
                    </td>

                    <td class="pe-4 py-3 text-end" sec:authorize="isAuthenticated()">
                        <a th:href="@{/movies/edit/{id}(id=${movie.id})}"
                           class="btn btn-outline-warning btn-sm me-2">Edit</a>

                        <form th:action="@{/movies/delete/{id}(id=${movie.id})}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
